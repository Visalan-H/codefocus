<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Code Focus</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #161616;
  --surface:  #1e1e1e;
  --surface2: #272727;
  --line:     #2d2d2d;
  --text:     #e8e8e8;
  --dim:      #8a8a8a;
  --accent:   #0078d4;
  --green:    #3dd68c;
  --green-lo: rgba(61,214,140,0.12);
  --red:      #e06c75;
  --mono:     ui-monospace,"JetBrains Mono","SF Mono",Consolas,monospace;
  --sans:     -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --ease:     cubic-bezier(0.4,0,0.2,1);
  --dur:      280ms;
  --r:        5px;
}

html, body {
  width: 260px;
  background: var(--bg);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  color: var(--text);
}

/* Two panels sit side by side in a 520px-wide track.
   Sliding the track left/right reveals one panel at a time.   */

.stage {
  width: 260px;
  display: grid;
  grid-template-areas: 'panel';
  overflow: hidden;
}

.panel {
  grid-area: panel;
  width: 260px;
  display: flex;
  flex-direction: column;
  transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
}

#panel-off {
  transform: translateX(0);
  opacity: 1;
}

#panel-on {
  transform: translateX(260px);
  opacity: 0;
  pointer-events: none;
}

.stage.show-on #panel-off {
  transform: translateX(-260px);
  opacity: 0;
  pointer-events: none;
}

.stage.show-on #panel-on {
  transform: translateX(0);
  opacity: 1;
  pointer-events: all;
}

/* ── topbar ─────────────────────────────── */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.wordmark {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}

/* pip — green dot in ON panel */
.pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px var(--green-lo);
  animation: pip-pulse 3s ease-in-out infinite;
}

@keyframes pip-pulse {
  0%,100% { box-shadow: 0 0 0 3px var(--green-lo); }
  50%      { box-shadow: 0 0 0 5px transparent; }
}

.topbar-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--line);
}

/* ── OFF panel ─────────────────────────────── */

.off-hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 22px 24px 26px;
}

/* power button */
.power-btn {
  position: relative;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: var(--surface);
  transition: background 0.15s, transform 0.1s;
  outline: none;
}

.power-btn::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  pointer-events: none;
  transition: border-color 0.15s;
}

.power-btn:hover         { background: var(--surface2); }
.power-btn:hover::after  { border-color: #444; }
.power-btn:active        { transform: scale(0.93); }

.power-btn svg {
  position: absolute;
  inset: 0;
  margin: auto;
}

.off-label { text-align: center; }

.off-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.off-sub {
  font-size: 13px;
  color: var(--dim);
  margin-top: 5px;
  line-height: 1.55;
}

/* ── topbar right slot ──────────────────── */

.topbar-end {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-off {
  font-size: 12px;
  font-family: var(--sans);
  color: var(--dim);
  background: none;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 4px 10px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  line-height: 1.3;
}

.btn-off:hover { color: var(--red); border-color: var(--red); }

/* ── ON body rows ───────────────────────── */

/* language row */
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--line);
}

.info-k {
  font-size: 13px;
  color: var(--dim);
}

.info-v {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

/* shortcut rows */
.sc-block {
  padding: 4px 14px 8px;
}

.sc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
}

.sc-name {
  font-size: 13px;
  color: var(--dim);
}

.keys { display: flex; gap: 3px; align-items: center; }

kbd {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid #3a3a3a;
  border-bottom: 2px solid #3a3a3a;
  border-radius: 4px;
  padding: 3px 7px;
  line-height: 1.3;
}

/* not on CF */
.not-cf {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--dim);
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- OFF -->
  <div class="panel" id="panel-off">
    <div class="topbar">
      <span class="wordmark">CodeFocus</span>
      <div class="topbar-dot"></div>
    </div>
    <div class="off-hero">
      <button class="power-btn" id="btn-enable" aria-label="Enable CodeFocus">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M9.5 8A8.5 8.5 0 1 0 18.5 8" stroke="#5a5a5a" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="3.5" x2="14" y2="14" stroke="#5a5a5a" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="off-label">
        <div class="off-title">Split view is off</div>
        <div class="off-sub">Enable the editor alongside<br>any Codeforces problem</div>
      </div>
    </div>
  </div>

  <!-- ON -->
  <div class="panel" id="panel-on">
    <div class="topbar">
      <span class="wordmark">CodeFocus</span>
      <div class="topbar-end">
        <button class="btn-off" id="btn-disable">Turn off</button>
        <div class="pip"></div>
      </div>
    </div>
    <div id="on-body"></div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
