<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Code Focus</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1a1a1a;
  --surface:  #242424;
  --line:     #303030;
  --text:     #e0e0e0;
  --dim:      #686868;
  --accent:   #0078d4;
  --accent-lo:rgba(0,120,212,0.15);
  --green:    #3dd68c;
  --green-lo: rgba(61,214,140,0.12);
  --mono:     ui-monospace,"JetBrains Mono","SF Mono",Consolas,monospace;
  --sans:     -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --ease:     cubic-bezier(0.4,0,0.2,1);
  --dur:      320ms;
}

html, body {
  width: 260px;
  background: var(--bg);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  color: var(--text);
}

/* ── slide stage ────────────────────────────────────────────── */
/* Two panels sit side by side in a 520px-wide track.
   Sliding the track left/right reveals one panel at a time.   */

.stage {
  width: 260px;
  display: grid;
  grid-template-areas: 'panel';
  overflow: hidden;
}

.panel {
  grid-area: panel;
  width: 260px;
  display: flex;
  flex-direction: column;
  transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
}

#panel-off {
  transform: translateX(0);
  opacity: 1;
}

#panel-on {
  transform: translateX(260px);
  opacity: 0;
  pointer-events: none;
}

.stage.show-on #panel-off {
  transform: translateX(-260px);
  opacity: 0;
  pointer-events: none;
}

.stage.show-on #panel-on {
  transform: translateX(0);
  opacity: 1;
  pointer-events: all;
}

/* ── shared topbar ──────────────────────────────────────────── */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 18px 13px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.wordmark {
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
}

.wordmark .sep { color: var(--dim); }

/* pip — used in ON panel only */
.pip {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px var(--green-lo);
  animation: pip-pulse 2.8s ease-in-out infinite;
}

@keyframes pip-pulse {
  0%,100% { box-shadow: 0 0 0 3px var(--green-lo); }
  50%      { box-shadow: 0 0 0 5px transparent; }
}

/* ── OFF panel ──────────────────────────────────────────────── */

#panel-off .topbar-right {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--line);
}

.off-hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  padding: 32px 28px;
}

/* power button */
.power-btn {
  position: relative;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: var(--surface);
  transition: background 0.15s, transform 0.1s;
  outline: none;
}

.power-btn::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  pointer-events: none;
  transition: border-color 0.15s;
}

.power-btn:hover         { background: #2c2c2c; }
.power-btn:hover::after  { border-color: #444; }
.power-btn:active        { transform: scale(0.92); }

.power-btn svg {
  position: absolute;
  inset: 0;
  margin: auto;
}

.off-label {
  text-align: center;
}

.off-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.off-sub {
  font-size: 11.5px;
  color: var(--dim);
  margin-top: 5px;
  line-height: 1.5;
}

/* ── ON panel ───────────────────────────────────────────────── */

.on-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.on-status-text {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--green);
  flex: 1;
}

.btn-off {
  font-size: 11px;
  font-family: var(--sans);
  color: var(--dim);
  background: none;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 3px 10px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.btn-off:hover { color: #e06c75; border-color: #e06c75; }

/* rows */
.rows { display: flex; flex-direction: column; flex: 1; }

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 18px;
  border-bottom: 1px solid var(--line);
  font-size: 12.5px;
}

.row:last-child { border-bottom: none; }

.row-label { color: var(--dim); }

.row-val {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text);
  font-weight: 500;
}

.keys { display: flex; gap: 3px; align-items: center; }

kbd {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--line);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 2px 7px;
  line-height: 1.4;
}

/* not-on-CF state inside ON panel */
.not-cf {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 22px;
  font-size: 12px;
  color: var(--dim);
  text-align: center;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- OFF -->
  <div class="panel" id="panel-off">
    <div class="topbar">
      <div class="wordmark">Code <span class="sep">//</span> Focus</div>
      <div class="topbar-right"></div>
    </div>
    <div class="off-hero">
      <button class="power-btn" id="btn-enable" aria-label="Enable CF-Runner">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M10 8.5A9 9 0 1 0 20 8.5" stroke="#686868" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="15" y1="4" x2="15" y2="15" stroke="#686868" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="off-label">
        <div class="off-title">Split view is off</div>
        <div class="off-sub">Press to enable the editor<br>alongside any CF problem</div>
      </div>
    </div>
  </div>

  <!-- ON -->
  <div class="panel" id="panel-on">
    <div class="topbar">
      <div class="wordmark">Code <span class="sep">//</span> Focus</div>
      <div class="pip"></div>
    </div>
    <div class="on-status">
      <div class="on-status-text">Active</div>
      <button class="btn-off" id="btn-disable">Turn off</button>
    </div>
    <div id="on-body" class="rows"></div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
